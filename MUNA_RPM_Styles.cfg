// =============================================================================
// M.U.N.A. - RasterPropMonitor (RPM) IVA Display Configuration
// Version: 1.0.0
// Author: Red (2026)
//
// REQUIREMENTS:
//   - RasterPropMonitor must be installed
//
// DESCRIPTION:
//   This file configures M.U.N.A.s display inside IVA (Internal View from
//   Avatar) cockpits. It adds a custom M.U.N.A. screen page to RPMs
//   multi-function displays (MFDs), accessible via the "G" button.
//
// HOW IT WORKS:
//   1. ModuleMunaCore exposes a KSPField called 'munaDisplay' containing the
//      current report text
//   2. RPM reads this field using its MODULE() variable accessor
//   3. The text file muna_screen.txt defines how the display looks
//   4. The 'G' button toggles to this page on compatible IVA screens
//
// SCREEN LAYOUT:
//   The display is defined in: MUNA/Assets/Pages/muna_screen.txt
//   This text file uses RPMs markup syntax for formatting.
//
// TROUBLESHOOTING:
//   - If the M.U.N.A. page doesnt appear, check that the part has both
//     ModuleMunaCore AND RasterPropMonitor modules
//   - The :AFTER[DE_IVA] ensures compatibility with DE_IVAs IVA overhaul
// =============================================================================

// =============================================================================
// RPM PAGE REGISTRATION
// =============================================================================
// This patch adds the M.U.N.A. page to all parts that have both:
//   - ModuleMunaCore (our M.U.N.A. system)
//   - RasterPropMonitor (RPMs display system)
//
// The page displays the live munaDisplay string from ModuleMunaCore.

@PART[*]:HAS[@MODULE[ModuleMunaCore],@MODULE[RasterPropMonitor]]:NEEDS[RasterPropMonitor]:AFTER[DE_IVA]
{
    @MODULE[RasterPropMonitor]
    {
        // -------------------------------------------------------------
        // M.U.N.A. IVA Page Definition
        // -------------------------------------------------------------
        PAGE
        {
            // Unique identifier for this page
            name = MUNA_Interface
            
            // The physical button on the IVA display that opens this page
            // button_G corresponds to the "G" button on RPM MFDs
            button = button_G
            
            // Path to the screen layout definition file
            // This file defines the visual appearance using RPMs markup
            text = MUNA/Assets/Pages/muna_screen.txt

            // -------------------------------------------------------------
            // Live Data Binding
            // -------------------------------------------------------------
            // This variable set links RPMs display to our PartModule.
            // Syntax: MODULE(ModuleType, index, FieldName)
            //   - ModuleType: ModuleMunaCore (our PartModule class name)
            //   - index: 0 (first instance of this module on the part)
            //   - FieldName: munaDisplay (the KSPField in our code)
            VARIABLESET
            {
                name     = MUNA_STATUS_TEXT
                variable = MODULE(ModuleMunaCore,0,munaDisplay)
            }
        }
    }
}
