// =============================================================================
// M.U.N.A. - Main Utility & Navigation Analyzer
// Core ModuleManager Configuration
// Version: 1.0.0
// Author: Red (2026)
//
// DESCRIPTION:
//   This file defines how M.U.N.A. gets installed on command modules and probes.
//   It uses ModuleManager patches to inject the ModuleMunaCore PartModule into
//   all parts that have ModuleCommand (crew capsules and probe cores).
//
// REQUIREMENTS:
//   - ModuleManager (any modern version)
//
// OPTIONAL MODS:
//   - RasterPropMonitor (for IVA displays)
//   - DE_IVA (for enhanced IVA support)
//
// INSTALLATION:
//   Place this file in GameData/MUNA/
// =============================================================================


// =============================================================================
// STEP 1: BASE INSTALLATION
// =============================================================================
// This patch adds ModuleMunaCore to ALL parts that have ModuleCommand
// (command pods, probe cores, etc.) but dont already have MUNA installed.
//
// Default values:
//   - Version: None (player must upgrade via career mode)
//   - Enabled: false (must be activated)
//   - Difficulty: Easy (Rockomax professional mode)
@PART[*]:HAS[@MODULE[ModuleCommand],!MODULE[ModuleMunaCore]]:FOR[MUNA]
{
    MODULE
    {
        name = ModuleMunaCore

        // =========================================================
        // M.U.N.A. UNIT CONFIGURATION
        // =========================================================
        
        // VERSION OPTIONS: None | Basic | Full
        // - None:  Not installed (default)
        // - Basic: Basic telemetry and reports
        // - Full:  Advanced AI-powered analysis with Groq
        installedVersion = None
        
        // Is the unit currently active?
        isMunaEnabled = false
        
        // DIFFICULTY OPTIONS: Easy | Normal | Hard
        // - Easy:   Rockomax mode - professional, reliable
        // - Normal: Rockomax mode - standard
        // - Hard:   Jebs Junk mode - unstable, sarcastic, duct-taped
        difficulty = Easy
        
        // =========================================================
        // CAREER MODE COSTS (Funds)
        // =========================================================
        // Prices scale with game difficulty - harder modes = more expensive
        easyCostBasic    = 2500    // Basic install cost (Easy mode)
        easyCostFull     = 8000    // Full install cost (Easy mode)
        normalCostBasic  = 8000    // Basic install cost (Normal mode)
        normalCostFull   = 25000   // Full install cost (Normal mode)
        hardCostBasic    = 20000   // Basic install cost (Hard mode)
        hardCostFull     = 60000   // Full install cost (Hard mode)
        reActivationCost = 500     // Cost to re-enable after disabling (if you turn it off)
        
        // =========================================================
        // GLITCH SYSTEM (Hard Mode Chaos)
        // Probability range: 0.0 (never) to 1.0 (always)
        // =========================================================
        glitchChanceEasy   = 0.0   // Reliable in Easy mode
        glitchChanceNormal = 0.0   // Reliable in Normal mode
        glitchChanceHard   = 0.25  // 25% chance of chaos in Hard mode
        
        // =========================================================
        // VISUAL CUSTOMIZATION
        // =========================================================
        // Icon displayed in the App Launcher and IVA screens
        munaAvatar = MUNA/Assets/Icons/muna_icon
    }
}


// =============================================================================
// STEP 2: RASTER PROPMONITOR INTEGRATION (Optional)
// =============================================================================
// This patch enables M.U.N.A. displays inside IVA (Internal View) cockpits.
// It only applies if RasterPropMonitor is installed.
//
// The MUNA_ACTIVE variable tells RPM whether to show M.U.N.A. on the screens.
//
// Note: The :BEFORE[DE_IVA] ensures compatibility with DE_IVAs IVA system.

@PART[*]:HAS[@MODULE[ModuleMunaCore],@MODULE[RasterPropMonitor]]:NEEDS[RasterPropMonitor]:BEFORE[DE_IVA]
{
    @MODULE[RasterPropMonitor]
    {
        // Link RPMs MUNA_ACTIVE flag to our isMunaEnabled setting
        %MUNA_ACTIVE = #$../MODULE[ModuleMunaCore]/isMunaEnabled$
    }
}
